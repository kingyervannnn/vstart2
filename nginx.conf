events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  resolver 127.0.0.11 valid=10s ipv6=off;
  sendfile on;
  gzip on;
  gzip_types application/json application/javascript text/css text/plain;

  server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;

    location = /api/backgrounds {
      proxy_pass http://storage-api:3110/api/backgrounds;
      proxy_http_version 1.1;
      client_max_body_size 320m;
      proxy_request_buffering off;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 10m;
      proxy_send_timeout 10m;
    }

    location /api/ {
      proxy_pass http://storage-api:3110/api/;
      proxy_http_version 1.1;
      # Legacy JSON asset uploads remain bounded here. Large backgrounds use
      # the streaming /api/backgrounds route above.
      client_max_body_size 32m;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 65s;
    }

    # Keep Hermes and its local tools bound to macOS loopback while making the
    # typed Agent Bridge available through V Start's own origin. This lets LAN
    # and Tailscale clients use Agent Mode without exposing port 3120 directly.
    location /agent-bridge/ {
      set $agent_bridge_upstream http://host.docker.internal:3120;
      rewrite ^/agent-bridge/(.*)$ /$1 break;
      proxy_pass $agent_bridge_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host 127.0.0.1:3120;
      proxy_set_header Origin http://127.0.0.1:3000;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 1h;
      proxy_send_timeout 1h;
      client_max_body_size 12m;
    }

    location /stt/ {
      set $stt_upstream http://stt-api:9000;
      rewrite ^/stt/(.*)$ /$1 break;
      proxy_pass $stt_upstream;
      proxy_read_timeout 120s;
      client_max_body_size 32m;
    }

    location /notes/ {
      set $notes_upstream http://notes-api:3410;
      proxy_pass $notes_upstream;
      proxy_read_timeout 65s;
    }

    location /image-search/ {
      set $image_search_upstream http://image-search-api:3310;
      proxy_pass $image_search_upstream;
      proxy_read_timeout 65s;
      client_max_body_size 52m;
    }

    location /searxng/ {
      set $searxng_upstream http://searxng:8080;
      rewrite ^/searxng/(.*)$ /$1 break;
      proxy_pass $searxng_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Script-Name /searxng;
      proxy_read_timeout 65s;
    }

    location = /index.html {
      add_header Cache-Control "no-store" always;
      try_files /index.html =404;
    }

    location / {
      add_header Cache-Control "no-store" always;
      try_files $uri $uri/ /index.html;
    }
  }
}
