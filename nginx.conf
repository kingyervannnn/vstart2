events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  resolver 127.0.0.11 valid=10s ipv6=off;
  sendfile on;
  gzip on;
  gzip_types application/json application/javascript text/css text/plain;

  server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
      proxy_pass http://storage-api:3110/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 65s;
    }

    location /stt/ {
      set $stt_upstream http://stt-api:9000;
      rewrite ^/stt/(.*)$ /$1 break;
      proxy_pass $stt_upstream;
      proxy_read_timeout 120s;
      client_max_body_size 32m;
    }

    location /gmail/ {
      set $gmail_upstream http://gmail-api:3510;
      proxy_pass $gmail_upstream;
      proxy_read_timeout 65s;
    }

    location /notes/ {
      set $notes_upstream http://notes-api:3410;
      proxy_pass $notes_upstream;
      proxy_read_timeout 65s;
    }

    location /image-search/ {
      set $image_search_upstream http://image-search-api:3310;
      proxy_pass $image_search_upstream;
      proxy_read_timeout 65s;
      client_max_body_size 52m;
    }

    location = /index.html {
      add_header Cache-Control "no-store" always;
      try_files /index.html =404;
    }

    location / {
      add_header Cache-Control "no-store" always;
      try_files $uri $uri/ /index.html;
    }
  }
}
