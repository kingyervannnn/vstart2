<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Preparing visual search…</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; color: rgba(239,243,252,.78); background: radial-gradient(circle at 50% 54%, rgba(116,143,221,.13), transparent 32%), #090c12; }
      main { display: grid; justify-items: center; gap: 14px; }
      i { width: 30px; height: 30px; border: 2px solid rgba(255,255,255,.12); border-top-color: #91aaff; border-radius: 50%; animation: spin .8s linear infinite; }
      strong { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; }
      small { color: rgba(239,243,252,.42); font-size: 10px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <main><i aria-hidden="true"></i><strong>Preparing visual search</strong><small>This tab will continue automatically.</small></main>
  </body>
</html>
