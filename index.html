<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#11141c" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      #vstart-boot-background {
        position: fixed;
        z-index: 0;
        inset: 0;
        pointer-events: none;
        background-color: #080a0f;
        background-position: center;
        background-size: cover;
        opacity: 1;
        transition: opacity 320ms ease;
      }
      #vstart-boot-background.vstart-boot-hidden { opacity: 0; }
      #root { position: relative; z-index: 1; }
    </style>
    <script>
      (() => {
        const url = `/api/backgrounds/startup?path=${encodeURIComponent(window.location.pathname || '/')}`
        window.__VSTART_BOOT_BACKGROUND_URL__ = url
        const preload = document.createElement('link')
        preload.rel = 'preload'
        preload.as = 'image'
        preload.href = url
        document.head.appendChild(preload)
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Josefin+Sans:wght@400;600&family=Noto+Sans+JP:wght@400;700&family=Orbitron:wght@400;600&family=Press+Start+2P&family=Roboto:wght@400;700&family=VT323&family=Fira+Code:wght@400;600&family=Space+Grotesk:wght@400;600&family=Montserrat:wght@400;700&family=Bebas+Neue&family=Exo+2:wght@400;700&family=Saira:wght@400;700&family=Lexend:wght@400;700&family=Audiowide&family=Kanit:wght@400;700&family=Manrope:wght@400;700&display=swap" rel="stylesheet" />
    <title>V Start 2</title>
  </head>
  <body>
    <div id="vstart-boot-background" aria-hidden="true"></div>
    <script>
      document.getElementById('vstart-boot-background').style.backgroundImage = `url("${window.__VSTART_BOOT_BACKGROUND_URL__}")`
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
